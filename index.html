<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Biomasa - Registro de Biometría</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #e9ecef; color: #495057; font-weight: bold; }
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .alert { padding: 15px; margin-top: 20px; border-radius: 4px; display: none; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Biometría y Mortalidad</h2>
    
    <div class="form-group">
        <label for="unidad">Unidad de Producción:</label>
        <select id="unidad">
            <option value="">-- Seleccione Unidad --</option>
            <option value="CANAL 1">CANAL 1 (Cachama)</option>
            <option value="CANAL 2">CANAL 2 (Bocachico)</option>
            <option value="CANAL 3">CANAL 3 (Cachama)</option>
            <option value="CANAL 4">CANAL 4 (Cachama)</option>
            <option value="CANAL 5">CANAL 5 (Cachama)</option>
            <option value="ESTANQUE 1">ESTANQUE 1 (Cachama)</option>
            <option value="ESTANQUE 2">ESTANQUE 2 (Cachama)</option>
            <option value="ESTANQUE 3">ESTANQUE 3 (Vacío)</option>
            <option value="ESTANQUE 4">ESTANQUE 4 (Cachama)</option>
            <option value="ESTANQUE 5">ESTANQUE 5 (Cachama)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="pecesAnteriores">Inventario Anterior (Peces Vivos):</label>
        <input type="number" id="pecesAnteriores" readonly>
    </div>

    <div class="form-group">
        <label for="muertes">Mortalidad Registrada (Nº Peces):</label>
        <input type="number" id="muertes" value="0" min="0" step="1">
    </div>

    <div class="form-group">
        <label for="pesoPromedio">Nuevo Peso Promedio (Gramos):</label>
        <input type="number" id="pesoPromedio" step="0.01" min="0">
    </div>

    <div class="form-group">
        <label for="pecesActuales">Inventario Actual Calculado (Peces):</label>
        <input type="number" id="pecesActuales" readonly>
    </div>

    <div class="form-group">
        <label for="biomasaTotal">Biomasa Total Calculada (Kilogramos):</label>
        <input type="number" id="biomasaTotal" readonly>
    </div>

    <button id="btnGuardar">Registrar Datos en Firebase</button>

    <div id="mensajeExito" class="alert alert-success">Registro guardado exitosamente en la base de datos.</div>
    <div id="mensajeError" class="alert alert-error">Error al guardar. Verifique la conexión o los datos.</div>
</div>

<script type="module">
    // Importaciones desde el CDN oficial de Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCGuHxPVOVnPpsC5tgfJAO1_nCS-qi4ySA",
      authDomain: "pexes-salim.firebaseapp.com",
      projectId: "pexes-salim",
      storageBucket: "pexes-salim.firebasestorage.app",
      messagingSenderId: "64381287898",
      appId: "1:64381287898:web:dc9d768ccf8cde5c85d4e3"
    };

    // Inicialización
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Estado base extraído del RESUMEN.csv
    const datosBase = {
        "CANAL 1": { especie: "CACHAMA", vivos: 30000, peso: 15 },
        "CANAL 2": { especie: "BOCHACHICO", vivos: 20000, peso: 118.42 },
        "CANAL 3": { especie: "CACHAMA", vivos: 30000, peso: 45.89 },
        "CANAL 4": { especie: "CACHAMA", vivos: 40000, peso: 41.05 },
        "CANAL 5": { especie: "CACHAMA", vivos: 20000, peso: 288.54 },
        "ESTANQUE 1": { especie: "CACHAMA", vivos: 70000, peso: 10.45 },
        "ESTANQUE 2": { especie: "CACHAMA", vivos: 50000, peso: 12.95 },
        "ESTANQUE 3": { especie: "", vivos: 0, peso: 0 },
        "ESTANQUE 4": { especie: "CACHAMA", vivos: 70000, peso: 2.93 },
        "ESTANQUE 5": { especie: "CACHAMA", vivos: 80000, peso: 5 }
    };

    // Referencias al DOM
    const selectUnidad = document.getElementById('unidad');
    const inPecesAnteriores = document.getElementById('pecesAnteriores');
    const inMuertes = document.getElementById('muertes');
    const inPesoPromedio = document.getElementById('pesoPromedio');
    const inPecesActuales = document.getElementById('pecesActuales');
    const inBiomasaTotal = document.getElementById('biomasaTotal');
    const btnGuardar = document.getElementById('btnGuardar');
    const msjExito = document.getElementById('mensajeExito');
    const msjError = document.getElementById('mensajeError');

    let especieActual = "";

    // Lógica de cálculo matemático estricto
    function calcularValores() {
        const anteriores = parseFloat(inPecesAnteriores.value) || 0;
        const muertes = parseFloat(inMuertes.value) || 0;
        const peso = parseFloat(inPesoPromedio.value) || 0;

        // Ecuación 1: Inventario actual
        const actuales = anteriores - muertes;
        inPecesActuales.value = actuales < 0 ? 0 : actuales;

        // Ecuación 2: Biomasa total en Kg
        const biomasa = (inPecesActuales.value * peso) / 1000;
        inBiomasaTotal.value = biomasa.toFixed(2);
    }

    // Eventos de la interfaz
    selectUnidad.addEventListener('change', (e) => {
        const unidad = e.target.value;
        if (datosBase[unidad]) {
            inPecesAnteriores.value = datosBase[unidad].vivos;
            inPesoPromedio.value = datosBase[unidad].peso;
            especieActual = datosBase[unidad].especie;
            inMuertes.value = 0;
            calcularValores();
        } else {
            inPecesAnteriores.value = '';
            inPesoPromedio.value = '';
            inPecesActuales.value = '';
            inBiomasaTotal.value = '';
        }
    });

    inMuertes.addEventListener('input', calcularValores);
    inPesoPromedio.addEventListener('input', calcularValores);

    // Guardado en Firestore
    btnGuardar.addEventListener('click', async () => {
        const unidadId = selectUnidad.value;
        if (!unidadId) {
            alert("Debe seleccionar una unidad de producción.");
            return;
        }

        const dataGuardar = {
            id_unidad: unidadId,
            especie: especieActual,
            muertes: parseInt(inMuertes.value),
            cantidad_peces_vivos: parseInt(inPecesActuales.value),
            peso_promedio_gramos: parseFloat(inPesoPromedio.value),
            biomasa_total_kilos: parseFloat(inBiomasaTotal.value),
            estatus: parseFloat(inPecesActuales.value) > 0 ? "BIOMETRIA" : "VACIO",
            fecha_actualizacion: serverTimestamp()
        };

        btnGuardar.disabled = true;
        btnGuardar.innerText = "Guardando...";

        try {
            // 1. Actualiza el documento principal (Resumen)
            const docRef = doc(db, "unidades_produccion", unidadId.replace(/\s+/g, '_'));
            await setDoc(docRef, dataGuardar);

            // 2. Guarda el registro histórico en la subcolección
            const historialRef = collection(docRef, "registros_historial");
            await addDoc(historialRef, dataGuardar);

            // Actualizar estado local para futuras ediciones sin recargar
            datosBase[unidadId].vivos = dataGuardar.cantidad_peces_vivos;
            datosBase[unidadId].peso = dataGuardar.peso_promedio_gramos;
            inPecesAnteriores.value = dataGuardar.cantidad_peces_vivos;
            inMuertes.value = 0;

            msjExito.style.display = 'block';
            msjError.style.display = 'none';
            setTimeout(() => { msjExito.style.display = 'none'; }, 4000);

        } catch (error) {
            console.error("Error técnico al escribir en Firestore: ", error);
            msjError.style.display = 'block';
            msjExito.style.display = 'none';
        } finally {
            btnGuardar.disabled = false;
            btnGuardar.innerText = "Registrar Datos en Firebase";
        }
    });
</script>
</body>
</html>
